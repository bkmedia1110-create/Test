<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHAHID TV | PRO</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="https://vid.alarabiya.net/images/2024/01/27/b431a07f-24e8-458c-a8a0-5e49d15d05be/b431a07f-24e8-458c-a8a0-5e49d15d05be_16x9_1200x676.jpg">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@3.0.0/dist/videojs-contrib-quality-levels.min.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #020617; --island-bg: rgba(15, 23, 42, 0.9); --island-border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #0f172a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,212,255,0.2); z-index: 10; }
        .logo { font-weight: 900; color: var(--primary); font-size: 1.2rem; }
        #installBtn { background: linear-gradient(45deg, var(--primary), #0072ff); color: #fff; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0, 212, 255, 0.3); }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; z-index: 100; cursor: pointer; }
        .video-js { width: 100% !important; height: 100% !important; }
        .video-js video { object-fit: fill !important; }
        body.is-rotated header, body.is-rotated main { display: none; }
        body.is-rotated .player-container { position: fixed; top: 0; left: 0; width: 100vh !important; height: 100vw !important; transform: rotate(90deg); transform-origin: top left; left: 100vw; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 105; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: space-between; transition: opacity 0.4s ease, visibility 0.4s; }
        .ui-overlay.hidden { opacity: 0; visibility: hidden; }
        .live-tag { position: absolute; top: 15px; left: 15px; background: #ff0000; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; display: flex; align-items: center; gap: 6px; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .p-mid { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .p-mid svg { width: 50px; height: 50px; fill: white; cursor: pointer; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .p-bottom { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; }
        .icon-btn { cursor: pointer; fill: white; width: 30px; height: 30px; }
        .q-menu { position: absolute; bottom: 85px; right: 20px; background: var(--island-bg); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid var(--island-border); display: none; flex-direction: column; z-index: 120; min-width: 140px; overflow: hidden; }
        .q-menu.active { display: flex; }
        .q-item { padding: 12px; text-align: center; font-size: 0.9rem; color: #fff; border-bottom: 1px solid var(--island-border); cursor: pointer; }
        .q-item.selected { color: var(--primary); font-weight: bold; background: rgba(0,212,255,0.1); }
        main { flex: 1; overflow-y: auto; padding: 20px 15px; }
        .island-container { display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; }
        .ch-island { background: var(--island-bg); border: 1px solid var(--island-border); padding: 18px 25px; border-radius: 35px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .ch-island.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); transform: scale(1.02); }
        .ch-name { font-weight: bold; font-size: 1.1rem; }
        .live-label-island { color: #ef4444; font-size: 0.7rem; font-weight: 800; border: 1px solid #ef4444; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHAHID TV</div>
        <button id="installBtn">تثبيت التطبيق 📲</button>
    </header>

    <div class="player-container" id="playerArea">
        <div class="live-tag"><div class="dot"></div> مباشر LIVE</div>
        <video id="mainVid" class="video-js vjs-big-play-centered" playsinline></video>
        <div class="q-menu" id="qMenu"></div>
        <div class="ui-overlay" id="uiOverlay">
            <div style="padding:20px; color:var(--primary); font-weight:bold;" id="pTitle">قناة المنار</div>
            <div class="p-mid">
                <svg viewBox="0 0 24 24" onclick="event.stopPropagation(); changeCh(-1);"><path d="M6 6h2v12H6zm3.5 6L19 18V6z"/></svg>
                <svg id="playIco" viewBox="0 0 24 24" onclick="event.stopPropagation(); togglePlay();"><path d="M8 5v14l11-7z"/></svg>
                <svg viewBox="0 0 24 24" onclick="event.stopPropagation(); changeCh(1);"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="p-bottom">
                <svg class="icon-btn" onclick="event.stopPropagation(); toggleQ();" viewBox="0 0 24 24"><path d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
                <svg id="rotateBtn" class="icon-btn" onclick="event.stopPropagation(); toggleRotate();" viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </div>
        </div>
    </div>

    <main><div class="island-container" id="chGrid"></div></main>

    <script>
        const channels = [
            { name: "قناة المنار", url: "https://edge.fastpublish.me/live/tracks-v1a1/mono.m3u8" },
            { name: "قناة العربية", url: "https://live.alarabiya.net/alarabiapublish/aswaaq.smil/alarabiapublish/aswaaq_source/chunks.m3u8" },
            { name: "قناة الجزيرة", url: "https://live-hls-v3-aja.getaj.net/AJA-V3/index.m3u8" }
        ];

        let curIdx = 0, uiTimeout, deferredPrompt;
        const player = videojs('mainVid');
        const uiOverlay = document.getElementById('uiOverlay');
        const installBtn = document.getElementById('installBtn');

        // تسجيل الـ Service Worker بشكل صحيح
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        // منطق زر التثبيت
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // واجهة التحكم
        function showUI() {
            uiOverlay.classList.remove('hidden');
            clearTimeout(uiTimeout);
            if (!player.paused()) uiTimeout = setTimeout(() => { uiOverlay.classList.add('hidden'); document.getElementById('qMenu').classList.remove('active'); }, 3500);
        }

        document.getElementById('playerArea').addEventListener('click', function(e) {
            if (e.target.closest('.p-mid') || e.target.closest('.p-bottom') || e.target.closest('.q-menu')) return;
            uiOverlay.classList.contains('hidden') ? showUI() : uiOverlay.classList.add('hidden');
        });

        function togglePlay() {
            if(player.paused()) { player.play(); document.getElementById('playIco').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; showUI(); }
            else { player.pause(); document.getElementById('playIco').innerHTML = '<path d="M8 5v14l11-7z"/>'; }
        }

        function toggleRotate() {
            document.body.classList.toggle('is-rotated');
            const btn = document.getElementById('rotateBtn');
            btn.innerHTML = document.body.classList.contains('is-rotated') ? 
                '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>' : 
                '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            showUI();
        }

        function setupQ() {
            const levels = player.qualityLevels();
            const menu = document.getElementById('qMenu');
            levels.on('addqualitylevel', () => {
                menu.innerHTML = '<div class="q-item selected" onclick="setQ(-1, this)">تلقائي</div>';
                for (let i = 0; i < levels.length; i++) menu.innerHTML += `<div class="q-item" onclick="setQ(${i}, this)">${levels[i].height || i+1}p</div>`;
            });
        }

        function setQ(idx, el) {
            const lvls = player.qualityLevels();
            for(let i=0; i<lvls.length; i++) lvls[i].enabled = (idx===-1 || i===idx);
            document.querySelectorAll('.q-item').forEach(it => it.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('qMenu').classList.remove('active');
            showUI();
        }

        function toggleQ() { document.getElementById('qMenu').classList.toggle('active'); showUI(); }

        function load(i) {
            curIdx = i;
            document.getElementById('pTitle').innerText = channels[i].name;
            player.src({ src: channels[i].url, type: 'application/x-mpegURL' });
            player.play();
            setupQ();
            render();
            showUI();
        }

        function changeCh(s) { curIdx = (curIdx + s + channels.length) % channels.length; load(curIdx); }

        function render() {
            document.getElementById('chGrid').innerHTML = channels.map((ch, i) => `
                <div class="ch-island ${i===curIdx?'active':''}" onclick="load(${i})">
                    <span class="ch-name">${ch.name}</span>
                    <span class="live-label-island">LIVE</span>
                </div>
            `).join('');
        }

        window.onload = () => load(0);
    </script>
</body>
</html>
