<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHAHID TV PRO</title>

    <link rel="manifest" href="data:application/manifest+json,{'name':'Shahid TV','short_name':'Shahid','start_url':'.','display':'standalone','background_color':'#020617','theme_color':'#00d4ff','icons':[{'src':'https://vid.alarabiya.net/images/2024/01/27/b431a07f-24e8-458c-a8a0-5e49d15d05be/b431a07f-24e8-458c-a8a0-5e49d15d05be_16x9_1200x676.jpg','sizes':'1200x676','type':'image/jpeg'}]}">
    <meta name="theme-color" content="#020617">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@3.0.0/dist/videojs-contrib-quality-levels.min.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #020617; --header-bg: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; background: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر */
        header { background: var(--header-bg); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .logo { font-weight: 900; color: var(--primary); font-size: 1.2rem; letter-spacing: 1px; }
        
        #installBtn { 
            background: linear-gradient(45deg, var(--primary), #00a2ff); 
            color: #000; border: none; padding: 7px 15px; border-radius: 20px; 
            font-weight: bold; cursor: pointer; display: none; font-size: 0.8rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* منطقة المشغل */
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; cursor: pointer; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* وسم LIVE */
        .live-label { 
            position: absolute; top: 15px; left: 15px; background: rgba(255, 0, 0, 0.9); 
            color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; 
            font-weight: bold; z-index: 100; display: flex; align-items: center; gap: 6px; pointer-events: none; 
        }
        .pulse-dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* واجهة التحكم */
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(0,0,0,0.6); transition: opacity 0.4s ease, visibility 0.4s;
            opacity: 1; visibility: visible;
        }
        .ui-overlay.hidden { opacity: 0; visibility: hidden; }

        .p-top { padding: 15px; font-weight: bold; color: var(--primary); background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        
        .p-mid { display: flex; justify-content: center; align-items: center; gap: 45px; }
        .p-mid svg { width: 50px; height: 50px; fill: white; cursor: pointer; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); }
        
        .p-bottom { padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .controls-row { display: flex; justify-content: space-between; align-items: center; }
        .icon-btn { cursor: pointer; fill: white; width: 26px; height: 26px; }

        /* قائمة الجودة */
        .quality-menu {
            position: absolute; bottom: 85px; right: 20px; background: #1e293b;
            border-radius: 12px; border: 1px solid var(--primary); display: none;
            flex-direction: column; min-width: 140px; z-index: 200; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .quality-menu.active { display: flex; }
        .q-item { padding: 12px; text-align: center; font-size: 0.9rem; border-bottom: 1px solid #334155; cursor: pointer; color: white; }
        .q-item:hover { background: rgba(255,255,255,0.1); }
        .q-item.selected { color: var(--primary); font-weight: bold; background: rgba(0,212,255,0.1); }

        /* قائمة القنوات */
        main { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        .list-title { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; font-weight: bold; border-right: 3px solid var(--primary); padding-right: 10px; }
        
        .ch-card { 
            background: #0f172a; padding: 16px; margin-bottom: 12px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .ch-card.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.08); }
        .ch-card h4 { margin: 0; font-size: 1rem; }
        .ch-status { color: #ef4444; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* وضع الدوران */
        .rotated { transform: rotate(90deg); width: 100vh !important; height: 100vw !important; position: fixed; top: 0; left: 0; z-index: 9999; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHAHID TV</div>
        <button id="installBtn">تثبيت التطبيق 📲</button>
    </header>

    <div class="player-wrapper" id="playerArea">
        <div class="live-label"><div class="pulse-dot"></div> مباشر LIVE</div>
        
        <video id="mainVid" class="video-js vjs-big-play-centered" playsinline></video>
        
        <div class="quality-menu" id="qMenu"></div>

        <div class="ui-overlay" id="uiOverlay">
            <div class="p-top" id="pTitle">قناة المنار</div>

            <div class="p-mid">
                <svg viewBox="0 0 24 24" onclick="event.stopPropagation(); changeCh(-1);"><path d="M6 6h2v12H6zm3.5 6L19 18V6z"/></svg>
                <svg id="playIco" viewBox="0 0 24 24" onclick="event.stopPropagation(); togglePlay();"><path d="M8 5v14l11-7z"/></svg>
                <svg viewBox="0 0 24 24" onclick="event.stopPropagation(); changeCh(1);"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>

            <div class="p-bottom">
                <div class="controls-row">
                    <div style="display:flex; gap:30px">
                        <svg class="icon-btn" onclick="event.stopPropagation(); toggleQ();" viewBox="0 0 24 24"><path d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
                        <svg class="icon-btn" onclick="event.stopPropagation(); rotate();" viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.54 5.9 20.21 2.21 15.7 1.05l-.77 1.45.77.47zM3.05 11c.36-3.75 2.69-6.92 5.96-8.47l.78-1.48C5.3 2.21 1.97 5.9 1.55 11h1.5z"/></svg>
                    </div>
                    <svg class="icon-btn" onclick="event.stopPropagation(); player.requestFullscreen();" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div class="list-title">القنوات المتاحة</div>
        <div id="chGrid"></div>
    </main>

    <script>
        const channels = [
            { name: "قناة المنار", url: "https://edge.fastpublish.me/live/tracks-v1a1/mono.m3u8" },
            { name: "قناة العربية", url: "https://live.alarabiya.net/alarabiapublish/aswaaq.smil/alarabiapublish/aswaaq_source/chunks.m3u8" },
            { name: "قناة الجزيرة", url: "https://live-hls-v3-aja.getaj.net/AJA-V3/index.m3u8" }
        ];

        let curIdx = 0, uiTimeout;
        const player = videojs('mainVid', {
            fluid: true,
            autoplay: false,
            controls: false,
            userActions: { doubleClick: false }
        });
        const uiOverlay = document.getElementById('uiOverlay');

        // إدارة ظهور واختفاء الواجهة
        function toggleUI() {
            if (uiOverlay.classList.contains('hidden')) {
                uiOverlay.classList.remove('hidden');
                resetTimer();
            } else {
                uiOverlay.classList.add('hidden');
                document.getElementById('qMenu').classList.remove('active');
            }
        }

        function resetTimer() {
            clearTimeout(uiTimeout);
            if (!player.paused()) {
                uiTimeout = setTimeout(() => {
                    uiOverlay.classList.add('hidden');
                    document.getElementById('qMenu').classList.remove('active');
                }, 3000);
            }
        }

        document.getElementById('playerArea').addEventListener('click', toggleUI);

        function togglePlay() {
            if(player.paused()) {
                player.play();
                document.getElementById('playIco').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                resetTimer();
            } else {
                player.pause();
                document.getElementById('playIco').innerHTML = '<path d="M8 5v14l11-7z"/>';
                clearTimeout(uiTimeout);
            }
        }

        function setupQuality() {
            const levels = player.qualityLevels();
            const menu = document.getElementById('qMenu');
            levels.on('addqualitylevel', () => {
                menu.innerHTML = '<div class="q-item selected" onclick="setQ(-1, this)">تلقائي Auto</div>';
                for (let i = 0; i < levels.length; i++) {
                    menu.innerHTML += `<div class="q-item" onclick="setQ(${i}, this)">${levels[i].height || i+1}p</div>`;
                }
            });
        }

        function setQ(idx, el) {
            const lvls = player.qualityLevels();
            for(let i=0; i<lvls.length; i++) lvls[i].enabled = (idx===-1 || i===idx);
            document.querySelectorAll('.q-item').forEach(it => it.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('qMenu').classList.remove('active');
            resetTimer();
        }

        function toggleQ() { document.getElementById('qMenu').classList.toggle('active'); resetTimer(); }
        function rotate() { document.getElementById('playerArea').classList.toggle('rotated'); resetTimer(); }

        function load(i) {
            curIdx = i;
            document.getElementById('pTitle').innerText = channels[i].name;
            player.src({ src: channels[i].url, type: 'application/x-mpegURL' });
            player.play();
            setupQuality();
            render();
            uiOverlay.classList.remove('hidden');
            resetTimer();
        }

        function changeCh(s) { curIdx = (curIdx + s + channels.length) % channels.length; load(curIdx); }

        function render() {
            document.getElementById('chGrid').innerHTML = channels.map((ch, i) => `
                <div class="ch-card ${i===curIdx?'active':''}" onclick="load(${i})">
                    <h4>${ch.name}</h4>
                    <div class="ch-status"><div class="pulse-dot" style="background:red"></div> مباشر</div>
                </div>
            `).join('');
        }

        // تسجيل الـ Service Worker لتمكين التثبيت PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ZW50ID0+IHsgfSk7');
            });
        }

        // منطق زر التثبيت
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        window.onload = () => load(0);
    </script>
</body>
</html>
